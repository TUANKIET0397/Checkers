<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Cờ Caro 10x10</title>
    <style>
        body {
            background: #111;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 30px;
        }

        #board {
            display: grid;
            gap: 2px;
            justify-content: center;
            margin: 20px auto;
        }

        .cell {
            width: 40px;
            height: 40px;
            background: #333;
            color: white;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 3px;
        }

        .cell:hover {
            background: #444;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            font-size: 16px;
            background: #00bfff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            color: white;
        }
    </style>
</head>

<body>
    <h1>Cờ Caro 10x10 – 5 thắng</h1>
    <div id="status">Đến lượt: <strong>X</strong></div>
    <div id="board"></div>
    <button onclick="resetGame()">Chơi lại</button>

    <script src="./main.js"></script>
</body>

</html>
